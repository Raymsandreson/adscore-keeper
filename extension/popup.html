<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafb; color: #1a1a2e; }
    .header { background: linear-gradient(135deg, #10b981, #059669); color: #fff; padding: 16px; text-align: center; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }
    .content { padding: 16px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #374151; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; outline: none; }
    input:focus { border-color: #10b981; box-shadow: 0 0 0 2px rgba(16,185,129,0.15); }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-primary { background: #10b981; color: #fff; }
    .btn-primary:hover { background: #059669; }
    .btn-danger { background: #ef4444; color: #fff; margin-top: 8px; }
    .btn-danger:hover { background: #dc2626; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 11px; margin-top: 6px; text-align: center; }
    .logged-in { text-align: center; }
    .logged-in .avatar { width: 48px; height: 48px; border-radius: 50%; background: #10b981; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; margin: 0 auto 8px; }
    .logged-in .name { font-size: 14px; font-weight: 600; }
    .logged-in .email { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .status { display: flex; align-items: center; gap: 6px; justify-content: center; margin: 10px 0; font-size: 12px; }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: #10b981; }
    .dot-red { background: #ef4444; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚖️ AdScore CRM</h1>
    <p>Integração WhatsApp</p>
  </div>

  <div class="content">
    <!-- Login Form -->
    <div id="loginView">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="loginBtn">Entrar</button>
      <div id="errorMsg" class="error hidden"></div>
    </div>

    <!-- Logged In View -->
    <div id="loggedInView" class="logged-in hidden">
      <div class="avatar" id="avatarInitial">?</div>
      <div class="name" id="userName">-</div>
      <div class="email" id="userEmail">-</div>
      <div class="status">
        <span class="dot dot-green"></span>
        <span>Conectado ao sistema</span>
      </div>
      <p style="font-size:11px; color:#6b7280; margin:8px 0;">Abra o WhatsApp Web para usar as funcionalidades do CRM.</p>
      <button class="btn btn-danger" id="logoutBtn">Sair</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
